<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="width:100%">
  <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
    <div style="padding:20px 4px;text-align:center;font-size:13px;color:#8D99AE;font-style:italic;font-family:Arial, sans-serif">Sem dados disponíveis.</div>
  </sc-if>
  <ul style="list-style:none;margin:0;padding:0">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="5">
      <li style="display:flex;align-items:center;gap:16px;padding:10px 0;font-size:13px;font-family:Arial, sans-serif;color:#34495E;border-bottom:1px solid #F0F1F3">
        <span style="flex:0 0 170px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="{{ it.label }}">{{ it.label }}</span>
        <span style="flex:1;position:relative;height:3px;background:#EDEEF0;display:block">
          <span style="position:absolute;left:0;top:0;height:100%;display:block;width:{{ it.pct }};background:{{ it.color }}"></span>
        </span>
        <span style="font-weight:600;min-width:88px;text-align:right;font-family:Arial, sans-serif;color:#1E2329;font-size:12.5px">{{ it.formattedValue }}</span>
      </li>
    </sc-for>
  </ul>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:220},&quot;items&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;array&quot;},&quot;isEmpty&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;boolean&quot;}}"></script>
</body>
</html>
